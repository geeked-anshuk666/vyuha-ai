services:
  # --- DATA PLANE ---

  aws:
    build: ./nodes
    container_name: vyuha-aws
    environment:
      - NODE_NAME=aws
      - CLOUD_PROVIDER=aws
      - REGION=us-east-1
    ports:
      - "8001:8000"
    networks:
      - vyuha-net
    restart: unless-stopped

  azure:
    build: ./nodes
    container_name: vyuha-azure
    environment:
      - NODE_NAME=azure
      - CLOUD_PROVIDER=azure
      - REGION=westeurope
    ports:
      - "8002:8000"
    networks:
      - vyuha-net
    restart: unless-stopped

  gcp:
    build: ./nodes
    container_name: vyuha-gcp
    environment:
      - NODE_NAME=gcp
      - CLOUD_PROVIDER=gcp
      - REGION=asia-south1
    ports:
      - "8003:8000"
    networks:
      - vyuha-net
    restart: unless-stopped

  vyuha-proxy:
    build: ./proxy
    container_name: vyuha-proxy
    environment:
      - CONFIG_PATH=/app/config.json
      - RELOAD_INTERVAL=3
      - VYUHA_API_KEY=${VYUHA_API_KEY:-vyuha-default-secret-key}
    ports:
      - "8000:8000"
    volumes:
      - proxy-config:/app
    networks:
      - vyuha-net
    depends_on:
      - aws
      - azure
      - gcp
    restart: unless-stopped

  # --- CONTROL PLANE ---

  orchestrator:
    build:
      context: .
      dockerfile: ./control_plane/Dockerfile
    container_name: vyuha-orchestrator
    environment:
      - VYUHA_DB_PATH=/app/data/vyuha.db
      - HEALTH_CHECK_INTERVAL=5
      - MAX_AGENT_FAILURES=3
      - GLM_API_KEY=${GLM_API_KEY:-placeholder-key}
      - GLM_API_URL=${GLM_API_URL:-https://open.bigmodel.cn/api/paas/v4/chat/completions}
      - GLM_MODEL=${GLM_MODEL:-glm-5.1}
      - VYUHA_API_KEY=${VYUHA_API_KEY:-vyuha-default-secret-key}
    ports:
      - "9000:9000"
    volumes:
      - orchestrator-data:/app/data
    networks:
      - vyuha-net
    depends_on:
      - aws
      - azure
      - gcp
      - vyuha-proxy
    restart: unless-stopped

  # --- UI DASHBOARD ---
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: vyuha-dashboard
    environment:
      - NEXT_PUBLIC_ORCHESTRATOR_URL=http://orchestrator:9000
    ports:
      - "3000:3000"
    networks:
      - vyuha-net
    depends_on:
      - orchestrator
    restart: unless-stopped

networks:
  vyuha-net:
    driver: bridge

volumes:
  proxy-config:
  orchestrator-data:
